# Ripped wholesale from the nanocoder folks.

name: Update Status Badges
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Once a day at midnight UTC
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Run tests for latest coverage
        run: uv run coverage run -m pytest && uv run coverage json || echo "Coverage test failed or not available"

      - name: Extract coverage (if available)
        id: coverage
        run: |
          if [ -f "coverage.json" ]; then
            COVERAGE=$(cat coverage.json | jq -r '.totals.percent_covered_display // "N/A"')
            echo "percentage=${COVERAGE}" >> $GITHUB_OUTPUT
          else
            echo "percentage=N/A" >> $GITHUB_OUTPUT
          fi

      - name: Run build to check status
        id: build
        run: |
          if uv build; then
            echo "status=passing" >> $GITHUB_OUTPUT
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          else
            echo "status=failing" >> $GITHUB_OUTPUT
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Generate badges
        run: |
          # Create badges directory if it doesn't exist
          mkdir -p badges

          # Coverage badge (with fallback if coverage not available) - with for-the-badge style
          if [ "${{ steps.coverage.outputs.percentage }}" != "N/A" ]; then
            COVERAGE_PERCENTAGE="${{ steps.coverage.outputs.percentage }}"
            COVERAGE_COLOR=$(echo "${COVERAGE_PERCENTAGE}" | awk '{print ($1 >= 80) ? "brightgreen" : ($1 >= 50) ? "yellow" : "red"}')
            curl -s "https://img.shields.io/badge/coverage-${COVERAGE_PERCENTAGE}%25-${COVERAGE_COLOR}?style=for-the-badge" > badges/coverage.svg
          else
            curl -s "https://img.shields.io/badge/coverage-N%2FA-lightgrey?style=for-the-badge" > badges/coverage.svg
          fi

          # Build status badge - with for-the-badge style and githubactions logo
          curl -s "https://img.shields.io/badge/build-${{ steps.build.outputs.status }}-${{ steps.build.outputs.color }}?style=for-the-badge&logo=githubactions" > badges/build.svg

          # PyPI Downloads (monthly) - with for-the-badge style and pypi logo
          curl -s "https://img.shields.io/pypi/dm/spiderweb-framework?style=for-the-badge&logo=pypi" > badges/pypi-downloads-monthly.svg

          # GitHub Repo Size - with for-the-badge style and github logo
          curl -s "https://img.shields.io/github/repo-size/itsthejoker/spiderweb?style=for-the-badge&logo=github" > badges/repo-size.svg

          # GitHub Repo Stars - with for-the-badge style and github logo
          curl -s "https://img.shields.io/github/stars/itsthejoker/spiderweb?style=for-the-badge&logo=github" > badges/stars.svg

          # GitHub Forks - with for-the-badge style and github logo
          curl -s "https://img.shields.io/github/forks/itsthejoker/spiderweb?style=for-the-badge&logo=github" > badges/forks.svg

          # PyPI version - with for-the-badge style and pypi logo
          curl -s "https://img.shields.io/pypi/v/spiderweb-framework?style=for-the-badge&logo=pypi" > badges/pypi-version.svg

      - name: Update README with badges
        run: |
          # Update badges in README.md
          if [ -f "README.md" ]; then
            # Create a temporary file to avoid direct modification issues
            cp README.md README.md.tmp
            
            # Replace or add badges in the README
            sed -i 's|!\[Build Status\].*|![Build Status](https://github.com/itsthejoker/spiderweb/raw/main/badges/build.svg)|' README.md.tmp || echo "Build badge not found, will add it"
            sed -i 's|!\[Coverage\].*|![Coverage](https://github.com/itsthejoker/spiderweb/raw/main/badges/coverage.svg)|' README.md.tmp || echo "Coverage badge not found, will add it"
            sed -i 's|!\[Version\].*|![Version](https://github.com/itsthejoker/spiderweb/raw/main/badges/pypi-version.svg)|' README.md.tmp || echo "Version badge not found, will add it"
            sed -i 's|!\[NPM Downloads\].*|![Downloads](https://github.com/itsthejoker/spiderweb/raw/main/badges/pypi-downloads-monthly.svg)|' README.md.tmp || echo "PyPI downloads badge not found, will add it"
            sed -i 's|!\[Downloads\].*|![Downloads](https://github.com/itsthejoker/spiderweb/raw/main/badges/pypi-downloads-monthly.svg)|' README.md.tmp || echo "Downloads badge not found, will add it"
            sed -i 's|!\[Stars\].*|![Stars](https://github.com/itsthejoker/spiderweb/raw/main/badges/stars.svg)|' README.md.tmp || echo "Stars badge not found, will add it"
            sed -i '/!\[License\]/d' README.md.tmp || echo "License badge not found"
            sed -i 's|!\[Repo Size\].*|![Repo Size](https://github.com/itsthejoker/spiderweb/raw/main/badges/repo-size.svg)|' README.md.tmp || echo "Repo size badge not found, will add it"
            sed -i 's|!\[Forks\].*|![Forks](https://github.com/itsthejoker/spiderweb/raw/main/badges/forks.svg)|' README.md.tmp || echo "Forks badge not found, will add it"
            
            # If badges section doesn't exist, add it after the first heading
            if ! grep -q "Build Status\|Coverage\|Version\|Downloads\|Stars" README.md.tmp; then
              # Add badges after the first heading
              sed -i '2i \
          \
          # Status Badges \
          \
          ![Build Status](https://github.com/itsthejoker/spiderweb/raw/main/badges/build.svg) \
          ![Coverage](https://github.com/itsthejoker/spiderweb/raw/main/badges/coverage.svg) \
          ![Version](https://github.com/itsthejoker/spiderweb/raw/main/badges/pypi-version.svg) \
          ![Downloads](https://github.com/itsthejoker/spiderweb/raw/main/badges/pypi-downloads-monthly.svg) \
          ![Stars](https://github.com/itsthejoker/spiderweb/raw/main/badges/stars.svg) \
          ![Repo Size](https://github.com/itsthejoker/spiderweb/raw/main/badges/repo-size.svg) \
          ![Forks](https://github.com/itsthejoker/spiderweb/raw/main/badges/forks.svg) \
          \
          ' README.md.tmp
            fi
            
            # Replace the original file
            mv README.md.tmp README.md
          fi

      - name: Commit and push badges
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add badges/ README.md
          # Only commit if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "📈 update status badges" || echo "No changes to commit"
            git push
          else
            echo "No changes to commit"
          fi
